<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>점프 퀴즈 아일랜드</title>
<style>
  :root{
    --ink:#253A4B;
    --paper:#FFF9EF;
    --sky:#7FD0F0;
    --coral:#FF6B5E;
    --leaf:#3ECF8E;
    --sunny:#FFC93C;
    --blue:#4A90F4;
    --grape:#9B7BFF;
    --shadow:0 6px 0 rgba(37,58,75,.9);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;touch-action:none;}
  body{
    font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
    background:var(--sky);
    color:var(--ink);
    user-select:none;-webkit-user-select:none;
  }
  #game{position:fixed;inset:0;}
  canvas{display:block;}

  /* ---------- 공통 카드/버튼 (장난감 블록 스타일) ---------- */
  .card{
    background:var(--paper);
    border:3px solid var(--ink);
    border-radius:22px;
    box-shadow:var(--shadow);
  }
  .btn{
    font-family:inherit;font-weight:800;color:var(--ink);
    background:#fff;border:3px solid var(--ink);border-radius:18px;
    box-shadow:0 5px 0 var(--ink);
    padding:12px 22px;font-size:18px;cursor:pointer;
    transition:transform .06s ease, box-shadow .06s ease;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}
  .btn:focus-visible{outline:4px solid var(--sunny);outline-offset:2px;}
  .btn.primary{background:var(--coral);color:#fff;font-size:22px;padding:16px 34px;}
  .btn.ghost{background:#fff;}

  /* ---------- 시작 화면 ---------- */
  #startScreen{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    padding:18px;z-index:30;
  }
  #startCard{
    max-width:420px;width:100%;padding:28px 24px;text-align:center;
  }
  #startCard .mascot{font-size:56px;line-height:1;}
  #startCard h1{font-size:30px;font-weight:900;margin:8px 0 4px;letter-spacing:-0.5px;}
  #startCard .tag{font-size:15px;font-weight:700;color:#6b7f8e;margin-bottom:18px;}
  .gradeRow{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
  .gradePill{
    flex:1;max-width:110px;padding:12px 0;border-radius:16px;border:3px solid var(--ink);
    background:#fff;font-weight:800;font-size:17px;cursor:pointer;box-shadow:0 4px 0 var(--ink);
    transition:transform .06s ease;
  }
  .gradePill.on{background:var(--coral);color:#fff;}
  .gradePill:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
  .stageRow{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
  .stageCard{flex:1;max-width:96px;padding:8px 2px 7px;border-radius:16px;border:3px solid var(--ink);
    background:#fff;font-weight:800;cursor:pointer;box-shadow:0 4px 0 var(--ink);font-size:21px;
    line-height:1.1;font-family:inherit;position:relative;transition:transform .06s ease;}
  .stageCard span{display:block;font-size:11.5px;margin-top:3px;color:var(--ink);}
  .stageCard em{position:absolute;top:4px;right:6px;font-style:normal;font-size:13px;}
  .stageCard.on{background:var(--sunny);}
  .stageCard.locked{opacity:.55;background:#E7EDF1;}
  .stageCard:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
  #controlsHint{font-size:13px;font-weight:700;color:#6b7f8e;margin-top:14px;line-height:1.6;}
  #verTag{font-size:11px;font-weight:700;color:#A8B8C4;margin-top:8px;}

  /* ---------- HUD ---------- */
  #hud{position:fixed;top:12px;left:0;right:0;display:none;justify-content:space-between;
    padding:0 14px;z-index:20;pointer-events:none;}
  .chip{padding:8px 16px;font-weight:900;font-size:18px;border-radius:16px;}

  /* ---------- 문제 배너 ---------- */
  #banner{
    position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);
    width:min(560px, calc(100% - 24px));padding:14px 18px;z-index:20;text-align:center;
    display:none;opacity:0;transition:opacity .2s ease, transform .2s ease;pointer-events:none;
  }
  #banner.show{display:block;opacity:1;transform:translateX(-50%) translateY(0);}
  #bChip{display:inline-block;padding:4px 14px;border-radius:12px;color:#fff;font-weight:900;
    font-size:14px;border:2.5px solid var(--ink);margin-bottom:6px;}
  #bMain{font-weight:900;font-size:30px;line-height:1.25;}
  #bMain.big{font-size:52px;}
  #bSub{font-weight:700;font-size:14px;color:#6b7f8e;margin-top:4px;}

  /* ---------- 토스트 ---------- */
  #toast{
    position:fixed;top:34%;left:50%;transform:translate(-50%,-50%) scale(.8);
    padding:14px 26px;font-size:24px;font-weight:900;z-index:25;opacity:0;pointer-events:none;
    transition:opacity .15s ease, transform .15s ease;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

  /* ---------- 끝 화면 ---------- */
  #endScreen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    padding:18px;z-index:30;}
  #endCard{max-width:420px;width:100%;padding:26px 24px;text-align:center;}
  #endCard h2{font-size:28px;font-weight:900;margin:6px 0 2px;}
  #endCard .coinLine{font-size:19px;font-weight:800;margin:8px 0 14px;}
  .statRow{display:flex;justify-content:space-between;align-items:center;
    background:#fff;border:2.5px solid var(--ink);border-radius:14px;
    padding:9px 14px;margin-bottom:8px;font-weight:800;font-size:16px;}
  .statRow .r{font-weight:900;}
  #endBtns{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
  #fallsLine{font-size:13px;font-weight:700;color:#6b7f8e;margin-top:8px;}

  /* ---------- 터치 컨트롤 ---------- */
  #touchUI{position:fixed;inset:0;z-index:15;display:none;pointer-events:none;}
  #lookPad{position:absolute;inset:0;pointer-events:auto;touch-action:none;}
  #stickBase{
    position:absolute;left:22px;bottom:26px;width:120px;height:120px;border-radius:50%;
    background:rgba(255,255,255,.28);border:3px solid rgba(255,255,255,.75);
    pointer-events:auto;
  }
  #stickKnob{
    position:absolute;left:50%;top:50%;width:52px;height:52px;border-radius:50%;
    background:#fff;border:3px solid var(--ink);box-shadow:0 3px 0 var(--ink);
    transform:translate(-50%,-50%);
  }
  #jumpBtn{
    position:absolute;right:26px;bottom:34px;width:92px;height:92px;border-radius:50%;
    background:var(--sunny);border:3px solid var(--ink);box-shadow:0 6px 0 var(--ink);
    font-size:17px;font-weight:900;color:var(--ink);pointer-events:auto;
    display:flex;align-items:center;justify-content:center;font-family:inherit;
  }
  #jumpBtn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--ink);}

  #keysHint{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    padding:8px 18px;font-size:14px;font-weight:800;z-index:18;display:none;
    transition:opacity .6s ease;
  }

  /* ---------- 상점 & 뽑기 ---------- */
  .btn.small{font-size:14px;padding:8px 14px;border-radius:14px;box-shadow:0 4px 0 var(--ink);}
  .btn:disabled{opacity:.45;cursor:default;}
  .btn:disabled:active{transform:none;box-shadow:0 5px 0 var(--ink);}
  .hidden{display:none !important;}
  #walletRow{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:14px;}
  #walletCoins{font-weight:900;font-size:18px;background:#fff;border:2.5px solid var(--ink);
    border-radius:14px;padding:8px 14px;}
  #profileNote{font-size:12px;font-weight:700;color:#6b7f8e;margin-top:8px;}
  #shopScreen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    padding:14px;z-index:40;background:rgba(37,58,75,.38);}
  #shopCard{max-width:440px;width:100%;max-height:92vh;overflow-y:auto;padding:18px 18px 22px;
    touch-action:pan-y;}
  #shopHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  #shopWallet{font-weight:900;font-size:19px;}
  #capsuleBox{text-align:center;margin:6px 0 10px;}
  #capsule{font-size:74px;display:inline-block;}
  #capsule.shaking{animation:capShake .85s ease-in-out;}
  @keyframes capShake{
    0%{transform:rotate(0) scale(1);}
    15%{transform:rotate(-16deg) translateX(-4px);}
    30%{transform:rotate(14deg) translateX(4px);}
    45%{transform:rotate(-12deg);}
    60%{transform:rotate(10deg) scale(1.05);}
    80%{transform:rotate(-6deg) scale(1.12);}
    100%{transform:rotate(0) scale(1);}
  }
  #pullBtn{width:100%;}
  #pullHint{text-align:center;font-size:13px;font-weight:700;color:#6b7f8e;margin-top:8px;}
  #revealCard{margin-top:12px;padding:16px;text-align:center;border-width:4px;}
  #revealCard .rEmoji{font-size:60px;line-height:1.1;}
  #revealCard .rName{font-size:21px;font-weight:900;margin-top:2px;}
  .rChip{display:inline-block;padding:3px 12px;border-radius:10px;color:#fff;font-weight:900;
    font-size:13px;border:2.5px solid var(--ink);}
  #revealCard .rSub{font-size:13px;font-weight:700;color:#6b7f8e;margin:6px 0 10px;}
  .invTitle{font-weight:900;font-size:16px;margin:14px 0 8px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .cell{background:#fff;border:2.5px solid var(--ink);border-radius:14px;padding:8px 2px 6px;
    text-align:center;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 var(--ink);}
  .cell:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink);}
  .cell .ce{font-size:26px;line-height:1.2;}
  .cell .cn{font-size:11px;font-weight:800;margin-top:2px;color:var(--ink);}
  .cell.locked{background:#E7EDF1;opacity:.75;}
  .cell.equipped{border-color:var(--coral);box-shadow:0 3px 0 var(--coral);background:#FFF1EE;}

  #reportScreen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    padding:14px;z-index:40;background:rgba(37,58,75,.38);}
  #reportCard{max-width:440px;width:100%;max-height:92vh;overflow-y:auto;padding:18px;touch-action:pan-y;}
  #repHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  #reportRow{margin-top:10px;}
  .repKid{background:#fff;border:2.5px solid var(--ink);border-radius:16px;padding:12px 14px;margin-bottom:12px;}
  .repName{font-weight:900;font-size:17px;margin-bottom:2px;}
  .repMeta{font-size:12.5px;font-weight:700;color:#6b7f8e;margin-bottom:8px;}
  .repRow{display:flex;align-items:center;gap:8px;margin:7px 0 2px;}
  .repLbl{font-weight:800;font-size:13.5px;width:64px;}
  .repBarWrap{flex:1;height:14px;background:#E7EDF1;border-radius:8px;border:2px solid var(--ink);overflow:hidden;}
  .repBar{height:100%;border-radius:6px;}
  .repPct{font-weight:900;font-size:13.5px;width:42px;text-align:right;}
  .repCnt{font-size:11.5px;font-weight:700;color:#6b7f8e;margin-left:72px;}
  .repMissT{font-weight:900;font-size:13.5px;margin:10px 0 4px;}
  .missRow{font-size:13px;font-weight:700;background:#FFF3F1;border:2px solid #F0C4BE;border-radius:10px;
    padding:5px 10px;margin-bottom:5px;display:flex;justify-content:space-between;gap:8px;align-items:center;}
  .repEmpty{font-size:13px;font-weight:700;color:#6b7f8e;padding:4px 0;}

  @media (max-width:420px){
    #bMain{font-size:24px;}
    #bMain.big{font-size:42px;}
    .chip{font-size:15px;padding:7px 12px;}
    #toast{font-size:20px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div id="game"></div>

<!-- HUD -->
<div id="hud">
  <div class="chip card" id="coinChip">🪙 0</div>
  <div class="chip card" id="gateChip">🚪 0/6</div>
</div>

<!-- 문제 배너 -->
<div id="banner" class="card">
  <div id="bChip">➕ 수학</div>
  <div id="bMain">7 + 5 = ?</div>
  <div id="bSub">정답이 적힌 문으로 들어가!</div>
</div>

<!-- 토스트 -->
<div id="toast" class="card">정답이야! 🎉</div>

<!-- 시작 화면 -->
<div id="startScreen">
  <div id="startCard" class="card">
    <div class="mascot">🏝️</div>
    <h1>점프 퀴즈 아일랜드</h1>
    <div class="tag">뛰고 · 풀고 · 모으자!</div>
    <div class="gradeRow">
      <button class="gradePill on" data-g="1">1학년</button>
      <button class="gradePill" data-g="2">2학년</button>
      <button class="gradePill" data-g="3">3학년</button>
    </div>
    <div class="stageRow">
      <button class="stageCard on" data-s="0">🏝️<span>하늘 섬</span><em></em></button>
      <button class="stageCard" data-s="1">💎<span>반짝 동굴</span><em></em></button>
      <button class="stageCard" data-s="2">🚀<span>둥둥 우주</span><em></em></button>
      <button class="stageCard" data-s="3">👑<span>보스 성</span><em></em></button>
    </div>
    <button class="btn primary" id="startBtn">모험 시작! 🚀</button>
    <div id="walletRow">
      <span id="walletCoins">🪙 0</span>
      <button class="btn ghost small" id="shopBtn">🎁 아이템 상점</button>
    </div>
    <div id="profileNote">학년마다 지갑과 아이템이 따로 저장돼요</div>
    <div id="reportRow"><button class="btn ghost small" id="reportBtn">📊 부모님 리포트</button></div>
    <div id="controlsHint"></div>
    <div id="verTag">v3.3</div>
  </div>
</div>

<!-- 끝 화면 -->
<div id="endScreen">
  <div id="endCard" class="card">
    <div style="font-size:52px;">🏆</div>
    <h2 id="endTitle">골인! 정말 잘했어!</h2>
    <div class="coinLine" id="endCoins">🪙 0개 모았어!</div>
    <div id="timeLine" style="font-size:14px;font-weight:800;margin:-6px 0 12px;"></div>
    <div id="statRows"></div>
    <div id="fallsLine"></div>
    <div id="endBtns">
      <button class="btn primary hidden" id="nextStageBtn">다음 ▶</button>
      <button class="btn primary" id="replayBtn">다시 하기 🔁</button>
      <button class="btn ghost" id="endShopBtn">🎁 뽑기 상점</button>
      <button class="btn ghost" id="menuBtn">학년 바꾸기</button>
    </div>
  </div>
</div>

<!-- 상점 -->
<div id="shopScreen">
  <div id="shopCard" class="card">
    <div id="shopHead">
      <button class="btn ghost small" id="shopClose">← 돌아가기</button>
      <span id="shopWallet">🪙 0</span>
    </div>
    <div id="capsuleBox"><div id="capsule">🎁</div></div>
    <button class="btn primary" id="pullBtn">뽑기! (10 🪙)</button>
    <div id="pullHint">모험에서 동전을 모아 멋진 아이템을 뽑아봐!</div>
    <div id="revealCard" class="card hidden"></div>
    <div id="invWrap">
      <div class="invTitle">🧢 모자 <span id="cntHat"></span></div>
      <div class="grid" id="gridHat"></div>
      <div class="invTitle">🐾 펫 <span id="cntPet"></span></div>
      <div class="grid" id="gridPet"></div>
      <div class="invTitle">👕 셔츠 <span id="cntShirt"></span></div>
      <div class="grid" id="gridShirt"></div>
    </div>
  </div>
</div>

<!-- 부모 리포트 -->
<div id="reportScreen">
  <div id="reportCard" class="card">
    <div id="repHead">
      <button class="btn ghost small" id="reportClose">← 돌아가기</button>
      <span style="font-weight:900;font-size:18px;">📊 학습 리포트</span>
    </div>
    <div id="reportBody"></div>
  </div>
</div>

<!-- 터치 컨트롤 -->
<div id="touchUI">
  <div id="lookPad"></div>
  <div id="stickBase"><div id="stickKnob"></div></div>
  <button id="jumpBtn">점프!</button>
</div>

<!-- 조작 힌트 -->
<div id="keysHint" class="card"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================
   점프 퀴즈 아일랜드 v1
   - 로블록스 스타일 3D 점프맵 + 교육 퀴즈 문 (수학/국어/영어)
   - PC(방향키/WASD+스페이스, 마우스 시점) & 터치(조이스틱+점프버튼, 화면 밀어 시점)
   ========================================================= */

// ---------- 유틸 ----------
function ri(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
const REDUCE = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ---------- 사운드 (Web Audio 합성) ----------
let AC = null;
function audioInit(){
  if(!AC){
    try{ AC = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ AC = null; }
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
function tone(freq, dur, type, vol, slideTo){
  if(!AC) return;
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, AC.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.15, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur + 0.02);
}
const sfx = {
  jump(){ tone(320, 0.18, 'square', 0.08, 620); },
  coin(){ tone(880, 0.09, 'sine', 0.14); setTimeout(()=>tone(1318,0.14,'sine',0.14), 70); },
  correct(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.16,'triangle',0.16), i*95)); },
  wrong(){ tone(210, 0.28, 'triangle', 0.12, 160); },
  goal(){ [523,659,784,1047,784,1319].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'triangle',0.16), i*130)); },
  fall(){ tone(300, 0.25, 'sine', 0.08, 120); }
};

// ---------- 아이템 & 뽑기 ----------
const PULL_COST = 10;
const RAR = {
  c:{ n:'보통', col:'#8FA3B0', w:55 },
  r:{ n:'레어', col:'#4A90F4', w:28 },
  e:{ n:'에픽', col:'#9B7BFF', w:13 },
  l:{ n:'전설', col:'#FFC93C', w:4 }
};
const REFUND = { c:3, r:5, e:8, l:15 };
const REGISTRY = [
  { id:'shirt_red',    cat:'shirt', name:'빨강 셔츠', emoji:'👕', rarity:'c', color:0xE05555 },
  { id:'shirt_pink',   cat:'shirt', name:'분홍 셔츠', emoji:'👕', rarity:'c', color:0xFF8FB1 },
  { id:'shirt_purple', cat:'shirt', name:'보라 셔츠', emoji:'👕', rarity:'c', color:0x9B7BFF },
  { id:'shirt_orange', cat:'shirt', name:'주황 셔츠', emoji:'👕', rarity:'c', color:0xFFA24C },
  { id:'shirt_sky',    cat:'shirt', name:'하늘 셔츠', emoji:'👕', rarity:'c', color:0x6FC1E8 },
  { id:'hat_cap',    cat:'hat', name:'야구모자',    emoji:'🧢', rarity:'r' },
  { id:'hat_straw',  cat:'hat', name:'밀짚모자',    emoji:'👒', rarity:'r' },
  { id:'hat_ribbon', cat:'hat', name:'리본',        emoji:'🎀', rarity:'r' },
  { id:'pet_chick',  cat:'pet', name:'병아리',      emoji:'🐤', rarity:'r', amp:0.12 },
  { id:'hat_wizard', cat:'hat', name:'마법사 모자',  emoji:'🎩', rarity:'e' },

// 저장: Claude 안에서는 window.storage, 직접 호스팅(GitHub Pages 등)에서는 localStorage, 둘 다 없으면 세션 메모리
const MEM = {};
async function storeGet(k){
  try{
    if(window.storage && window.storage.get){
      const r = await window.storage.get(k);
      if(r && typeof r.value === 'string') return r.value;
    } else if(typeof localStorage !== 'undefined'){
      const v = localStorage.getItem(k);
      if(v !== null) return v;
    }
  }catch(e){}
  return (k in MEM) ? MEM[k] : null;
}
async function storeSet(k, v){
  MEM[k] = v;
  try{
    if(window.storage && window.storage.set){ await window.storage.set(k, v); }
    else if(typeof localStorage !== 'undefined'){ localStorage.setItem(k, v); }
  }catch(e){}
}
function profKey(g){ return 'jqi-save-' + g; }
function markDirty(){ dirty = true; }
async function saveProfile(){
  dirty = false; lastSaveT = performance.now();
  const data = { coins: coinCount, owned: Array.from(owned), equip: equip, cleared: cleared, report: report, best: best };
  await storeSet(profKey(GRADE), JSON.stringify(data));
}
async function loadProfile(g){
  GRADE = g;
  let d = null;
  const raw = await storeGet(profKey(g));
  if(raw){ try{ d = JSON.parse(raw); }catch(e){ d = null; } }
  coinCount = (d && d.coins) || 0;
  owned = new Set((d && d.owned) || []);
  equip = (d && d.equip) || { hat:null, pet:null, shirt:null };
  cleared = (d && d.cleared) || [false, false, false, false];
  while(cleared.length < 4) cleared.push(false);
  best = (d && d.best) || {};
  report = (d && d.report && d.report.sub) ? d.report : newReport();
  if(STAGE > 0 && !stageUnlocked(STAGE)) STAGE = 0;
  applyEquips();
  updateWallet();
  renderShop();
  updateStageRow();
  buildDeco(STAGE);
  buildCourse(GRADE, STAGE);
}

function clearGroup(g){
  while(g.children.length){
    const c = g.children.pop();
    g.remove(c);
    if(c.geometry) c.geometry.dispose();
    if(c.material) c.material.dispose();
  }
}
function mk(g, geo, color, x, y, z, rx, ry, rz){
  const m = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color }));
  m.position.set(x, y, z);
  if(rx) m.rotation.x = rx;
  if(ry) m.rotation.y = ry;
  if(rz) m.rotation.z = rz;
  g.add(m); return m;
}

function rollItem(){
  const total = Object.keys(RAR).reduce((s,k)=>s+RAR[k].w, 0);
  let roll = Math.random() * total;
  let rk = 'c';
  for(const k of Object.keys(RAR)){
    roll -= RAR[k].w;
    if(roll <= 0){ rk = k; break; }

  return pick(REGISTRY.filter(x=>x.rarity===rk));
}

function renderKidReport(name, d){
  const rep = d && d.report;
  const subs = [ ['math','➕ 수학'], ['ko','📚 국어'], ['en','🔤 영어'] ];
  let inner = '<div class="repName">' + name + '</div>';
  let totAll = 0, okAll = 0;
  if(rep && rep.sub){
    subs.forEach(s=>{
      const v = rep.sub[s[0]] || {ok:0,wrong:0};
      totAll += v.ok + v.wrong;
      okAll += v.ok;
    });
  }
  if(!rep || totAll === 0){
    inner += '<div class="repEmpty">아직 플레이 기록이 없어요 🌱</div>';
    return '<div class="repKid">' + inner + '</div>';
  }
  inner += '<div class="repMeta">골인 ' + (rep.runs || 0) + '회 · 문제 ' + totAll + '번 도전 · 전체 정답률 ' +
           Math.round(okAll/totAll*100) + '%</div>';
  subs.forEach(s=>{
    const v = rep.sub[s[0]] || {ok:0,wrong:0};
    const t = v.ok + v.wrong;
    const pct = t ? Math.round(v.ok/t*100) : 0;
    inner += '<div class="repRow"><span class="repLbl">' + s[1] + '</span>' +
      '<div class="repBarWrap"><div class="repBar" style="width:' + pct + '%;background:' + SUB_COLOR_HEX[s[0]] + '"></div></div>' +
      '<span class="repPct">' + (t ? pct + '%' : '—') + '</span></div>' +
      '<div class="repCnt">정답 ' + v.ok + ' · 오답 ' + v.wrong + '</div>';
  });
  const missed = rep.missed || {};
  const top = Object.keys(missed).sort((a,b)=>missed[b]-missed[a]).slice(0,5);
  inner += '<div class="repMissT">🔎 자주 틀린 문제</div>';
  if(top.length){
    top.forEach(k=>{
      const parts = k.split('|');
      inner += '<div class="missRow"><span>' + parts[1] + '  (답: ' + parts[2] + ')</span><b>' + missed[k] + '번</b></div>';
    });
  } else {
    inner += '<div class="repEmpty">틀린 문제가 없어요! 👏</div>';
  }
  return '<div class="repKid">' + inner + '</div>';
}

async function doPull(){
  if(pulling || coinCount < PULL_COST) return;
  pulling = true;
  audioInit();
  coinCount -= PULL_COST;
  markDirty(); updateWallet(); renderShop();
  el('revealCard').classList.add('hidden');
  const cap = el('capsule');
  if(!REDUCE){
    cap.classList.add('shaking');
    [0,140,280,430,600].forEach((d,i)=>setTimeout(()=>tone(420+i*90, 0.07, 'square', 0.06), d));
    await sleep(880);
    cap.classList.remove('shaking');
  } else {
    await sleep(120);
  }
  const it = rollItem();
  let refund = 0;
  if(owned.has(it.id)){
    refund = REFUND[it.rarity];
    coinCount += refund;
    sfx.coin();
  } else {
    owned.add(it.id);
    if(it.rarity === 'l'){ sfx.goal(); burst(pX, pY + 3, pZ, 40, [0xFFC93C, 0xFF6B5E, 0x9B7BFF, 0xffffff]); }
    else if(it.rarity === 'e'){ sfx.correct(); }
    else { sfx.coin(); }
  }
  markDirty(); await saveProfile();
  showReveal(it, refund);
  updateWallet(); renderShop();
  pulling = false;
  renderShop();
}

function mathDistractors(ans){
  const set = new Set([ans]);
  const out = [];
  const tweaks = [1,-1,2,-2,10,-10,3,-3];
  let i = 0;
  while(out.length < 2 && i < 40){
    const d = ans + pick(tweaks);
    if(d > 0 && !set.has(d)){ set.add(d); out.push(d); }
    i++;
  }
  while(out.length < 2){ out.push(ans + out.length + 4); }
  return out;
}
function wordDistractors(bank, correct){
  const others = shuffle(bank.filter(x => x.w !== correct)).slice(0,2).map(x => x.w);
  return others;
}
function genMath(grade){
  let a, b, ans, txt;
  if(grade === 1){
    if(Math.random() < 0.55){ a = ri(1,9); b = ri(1,9); ans = a+b; txt = a+' + '+b+' = ?'; }
    else { a = ri(5,18); b = ri(1, a-1); ans = a-b; txt = a+' - '+b+' = ?'; }
  } else if(grade === 2){
    if(Math.random() < 0.5){ a = ri(2,5); b = ri(2,9); ans = a*b; txt = a+' × '+b+' = ?'; }
    else if(Math.random() < 0.5){ a = ri(11,60); b = ri(11,39); ans = a+b; txt = a+' + '+b+' = ?'; }
    else { a = ri(30,80); b = ri(11, a-10); ans = a-b; txt = a+' - '+b+' = ?'; }
  } else {
    const r3 = Math.random();
    if(r3 < 0.35){ a = ri(2,9); b = ri(2,9); ans = a*b; txt = a+' × '+b+' = ?'; }
    else if(r3 < 0.65){ b = ri(2,9); ans = ri(2,9); a = b*ans; txt = a+' ÷ '+b+' = ?'; } // 나머지 없는 나눗셈(구구단 역연산) 30%
    else if(r3 < 0.83){ a = ri(25,90); b = ri(15,90); ans = a+b; txt = a+' + '+b+' = ?'; }
    else { a = ri(50,99); b = ri(15, a-5); ans = a-b; txt = a+' - '+b+' = ?'; }
  }
  const answers = [String(ans)].concat(mathDistractors(ans).map(String));
  return { sub:'math', chip:'➕ 수학', color:'#4A90F4', main:txt, hint:'알맞은 답을 골라!', big:false,
           answers, correct: answers[0] };
}
function genKo(grade){
  if(grade === 1){
    const it = pick(KO_L1);
    return { sub:'ko', chip:'📚 국어', color:'#3ECF8E', main:it.e, hint:'이 그림의 이름은?', big:true,
             answers:[it.w].concat(wordDistractors(KO_L1, it.w)), correct: it.w };
  }
  const bank = (grade === 2) ? KO_L2 : KO_L3;
  const it = pick(bank);
  return { sub:'ko', chip:'📚 국어', color:'#3ECF8E', main:it.e, hint:'바르게 쓴 말을 골라!', big:true,
           answers:[it.ok].concat(it.bad.slice(0,2)), correct: it.ok };
}
function genEn(grade){
  if(grade === 1){
    const it = pick(EN_L1);
    return { sub:'en', chip:'🔤 영어', color:'#9B7BFF', main:it.e, hint:'영어로 뭐라고 할까?', big:true,
             answers:[it.w].concat(wordDistractors(EN_L1, it.w)), correct: it.w };
  }
  if(grade === 2){
    const it = pick(EN_L2);
    return { sub:'en', chip:'🔤 영어', color:'#9B7BFF', main:it.e + '  ' + it.p, hint:'빈칸에 들어갈 글자는?', big:false,
             answers:[it.ok].concat(it.bad.slice(0,2)), correct: it.ok };
  }
  const it = pick(EN_L3);
  return { sub:'en', chip:'🔤 영어', color:'#9B7BFF', main:it.e, hint:'영어로 뭐라고 할까?', big:true,
           answers:[it.w].concat(wordDistractors(EN_L3, it.w)), correct: it.w };
}
function genQuestion(sub, grade){
  if(sub === 'math') return genMath(grade);
  if(sub === 'ko') return genKo(grade);
  return genEn(grade);
}

// ---------- 캔버스 텍스처 ----------
function roundRectPath(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}
function fitFont(ctx, text, maxW, startSize, family){
  let size = startSize;
  while(size > 18){
    ctx.font = '900 ' + size + 'px ' + family;
    if(ctx.measureText(text).width <= maxW) break;
    size -= 4;
  }
  return size;
}
const FAM = "-apple-system,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif";
function makeLabelTexture(text){
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 256;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,256,256);
  roundRectPath(ctx, 14, 14, 228, 228, 40);
  ctx.fillStyle = '#FFF9EF'; ctx.fill();
  ctx.lineWidth = 10; ctx.strokeStyle = '#253A4B'; ctx.stroke();
  const size = fitFont(ctx, text, 190, 96, FAM);
  ctx.font = '900 ' + size + 'px ' + FAM;
  ctx.fillStyle = '#253A4B';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 134);
  const tx = new THREE.CanvasTexture(cv);
  return tx;
}
function makeSignTexture(text, bg){
  const cv = document.createElement('canvas');
  cv.width = 640; cv.height = 170;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,640,170);
  roundRectPath(ctx, 8, 8, 624, 154, 34);
  ctx.fillStyle = bg; ctx.fill();
  ctx.lineWidth = 10; ctx.strokeStyle = '#253A4B'; ctx.stroke();
  const size = fitFont(ctx, text, 560, 74, FAM);
  ctx.font = '900 ' + size + 'px ' + FAM;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 320, 92);
  return new THREE.CanvasTexture(cv);
}
function makeFaceTexture(){
  const cv = document.createElement('canvas');
  cv.width = 128; cv.height = 128;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#FFD34D'; ctx.fillRect(0,0,128,128);
  ctx.fillStyle = '#253A4B';
  ctx.beginPath(); ctx.arc(42, 52, 8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(86, 52, 8, 0, Math.PI*2); ctx.fill();
  ctx.lineWidth = 8; ctx.strokeStyle = '#253A4B'; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(64, 70, 24, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  return new THREE.CanvasTexture(cv);
}

function addGate(gz, top, sub, grade){
  const q = genQuestion(sub, grade);
  const wallZ = gz - 2;
  const wallMat = new THREE.MeshLambertMaterial({ color: CURSTAGE.wall, transparent:true });
  const fadeMats = [wallMat];

  // 기둥 + 상단부
  const pillarXs = [[-7,-5.25], [-2.25,-1.5], [1.5,2.25], [5.25,7]];
  pillarXs.forEach(seg=>{
    const w = seg[1]-seg[0];
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, 4.6, 0.6), wallMat);
    m.position.set((seg[0]+seg[1])/2, top + 2.3, wallZ);
    courseGroup.add(m);
  });
  const lintel = new THREE.Mesh(new THREE.BoxGeometry(14, 4.6 - DOOR_H, 0.6), wallMat);
  lintel.position.set(0, top + DOOR_H + (4.6 - DOOR_H)/2, wallZ);
  courseGroup.add(lintel);

  // 문 3개 (정답 섞기)
  const shuffled = shuffle(q.answers);
  const correct = shuffled.indexOf(q.correct);
  const doors = [];
  for(let i=0;i<3;i++){
    const doorMat = new THREE.MeshLambertMaterial({ color: DOOR_COLORS[i], transparent:true });
    const door = new THREE.Mesh(new THREE.BoxGeometry(DOOR_W, DOOR_H, 0.5), doorMat);
    door.position.set(DOOR_XS[i], top + DOOR_H/2, wallZ);

    label.position.set(DOOR_XS[i], top + DOOR_H/2 + 0.05, wallZ + 0.28);
    courseGroup.add(label);
    doors.push({ mesh: door, label, openY0: door.position.y });
    fadeMats.push(doorMat, labelMat);
  }

  // 과목 간판 (벽보다 살짝 앞 → 위로 열린 문에 가려지지 않음)
  const signMat = new THREE.MeshBasicMaterial({ map: makeSignTexture(q.chip + ' 문제!', SUB_COLOR_HEX[sub]), transparent:true });
  const sign = new THREE.Mesh(new THREE.PlaneGeometry(6.4, 1.7), signMat);
  sign.position.set(0, top + 5.7, wallZ + 0.5);
  courseGroup.add(sign);
  fadeMats.push(signMat);

  gates.push({ gz, wallZ, platTop: top, doors, correct, solved:false, q, sign, openT:0, cool:0, fadeMats });
}

function disposeCourse(){
  if(!courseGroup) return;
  courseGroup.traverse(obj=>{
    if(obj.geometry) obj.geometry.dispose();
    if(obj.material){
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach(m=>{ if(m.map) m.map.dispose(); m.dispose(); });
    }
  });
  scene.remove(courseGroup);
  courseGroup = null;
}

function buildCourse(grade, si){
  CURSTAGE = STAGES[si];
  const S = CURSTAGE;
  disposeCourse();
  platforms = []; coins = []; gates = []; particles.forEach(p=>scene.remove(p.mesh)); particles = [];
  shots.forEach(s=>{ scene.remove(s.m); s.m.geometry.dispose(); s.m.material.dispose(); });
  shots = []; bossGroup = null; starMesh = null;
  courseGroup = new THREE.Group();
  scene.add(courseGroup);

  if(S.boss){
    buildBossCourse(grade);
    return;
  }

  const topMax = (si === 2) ? 3.4 : 2.6;
  let z = 0, top = 0;
  addPlat(0, 0, 0, 12, 12, { color: S.startCol });   // 시작 섬
  let prevHalf = 6;

  const plans = stagePlans(si);
  for(let gi=0; gi<6; gi++){
    const plan = plans[gi];
    for(let hi=0; hi<plan.length; hi++){
      const h = plan[hi];
      const isMv = !!h.mv;
      const gap = isMv ? S.gapMv : S.gap;
      z -= (prevHalf + gap + 2);
      if(!isMv) top = clamp(top + (h.dt || 0), 0, topMax);
      let p;
      if(h.mv === 'x'){
        p = addPlat(0, top, z, 4, 4, { moving:true, axis:'x', amp:S.mvAmp, sp:1.0, color:S.mvCol });
      } else if(h.mv === 'y'){
        p = addPlat(h.dx || 0, top, z, 4, 4, { moving:true, axis:'y', amp:1.1, sp:1.2, color:S.mvCol });
      } else {
        p = addPlat(h.dx, top, z, 4, 4, {});
      }
      prevHalf = 2;
      addCoin(p.x, top + (h.mv === 'y' ? 1.9 : 1.25), z);
    }
    // 퀴즈 문 섬
    z -= (prevHalf + S.gap + 5);
    addPlat(0, top, z, 13, 10, { color: S.gateCol });
    prevHalf = 5;
    addCoin(-3, top + 1.25, z + 3);
    addCoin( 3, top + 1.25, z + 3);
    addGate(z, top, GATE_ORDER[gi], grade);
  }

  // 골인 섬
  z -= (prevHalf + S.gap + 7);
  addPlat(0, top, z, 15, 14, { color: S.goalCol });
  goalZ = z;
  const starTx = makeSignTexture('⭐ 골인! ⭐', '#FF6B5E');
  starMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(8, 2.1),
    new THREE.MeshBasicMaterial({ map: starTx, transparent:true })
  );
  starMesh.position.set(0, top + 4.6, z);
  courseGroup.add(starMesh);
  const pole = new THREE.Mesh(
    new THREE.BoxGeometry(0.35, 4.4, 0.35),
    new THREE.MeshLambertMaterial({ color: S.dirt })
  );
  pole.position.set(0, top + 2.2, z);
  courseGroup.add(pole);
}

function buildBossCourse(grade){
  const S = CURSTAGE;
  let z = 0, top = 0;
  addPlat(0, 0, 0, 12, 12, { color: S.startCol });
  let prevHalf = 6;
  const order = shuffle(['math','ko','en']).concat(shuffle(['math','ko','en']).slice(0,2));
  for(let gi=0; gi<5; gi++){
    z -= (prevHalf + 1.3 + 5);
    addPlat(0, top, z, 13, 10, { color: S.gateCol });
    prevHalf = 5;
    addCoin(-3, top + 1.25, z + 3);
    addCoin( 3, top + 1.25, z + 3);
    addGate(z, top, order[gi], grade);
  }
  // 보스 무대 (걸어서 골인 불가, 보스를 물리쳐야 클리어)
  z -= (prevHalf + 2.2 + 8);
  addPlat(0, top, z, 17, 16, { color: 0x5C3344 });
  goalZ = z - 9999;
  buildBoss(0, top, z - 4);
}

      vy: 4 + Math.random()*6,
      vz: (Math.random()-0.5)*7,
      life: 1.1 + Math.random()*0.5
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.life -= dt;
    p.vy -= 18*dt;
    p.mesh.position.x += p.vx*dt;
    p.mesh.position.y += p.vy*dt;
    p.mesh.position.z += p.vz*dt;
    p.mesh.rotation.x += 5*dt; p.mesh.rotation.z += 4*dt;
    if(p.life <= 0){
      scene.remove(p.mesh);
      p.mesh.geometry.dispose(); p.mesh.material.dispose();
      particles.splice(i,1);
    }
  }
}

(function setupTouch(){
  const base = document.getElementById('stickBase');
  const knob = document.getElementById('stickKnob');
  const jb = document.getElementById('jumpBtn');
  let stickId = null;
  function setKnob(dx, dy){
    knob.style.transform = 'translate(-50%,-50%) translate(' + (dx*34) + 'px,' + (dy*34) + 'px)';
  }
  function handle(ev){
    const r = base.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    let dx = (ev.clientX - cx) / (r.width/2);
    let dy = (ev.clientY - cy) / (r.height/2);
    const len = Math.hypot(dx, dy);
    if(len > 1){ dx/=len; dy/=len; }
    stickX = (Math.abs(dx) < 0.16) ? 0 : dx;
    stickY = (Math.abs(dy) < 0.16) ? 0 : dy;
    setKnob(dx, dy);
  }
  base.addEventListener('pointerdown', ev=>{
    stickId = ev.pointerId;
    base.setPointerCapture(ev.pointerId);
    handle(ev); audioInit(); ev.preventDefault();
  });
  base.addEventListener('pointermove', ev=>{ if(ev.pointerId===stickId) handle(ev); });
  function release(ev){
    if(ev.pointerId===stickId){ stickId=null; stickX=0; stickY=0; setKnob(0,0); }
  }
  base.addEventListener('pointerup', release);
  base.addEventListener('pointercancel', release);

  jb.addEventListener('pointerdown', ev=>{ jumpBuf = 0.13; audioInit(); ev.preventDefault(); });
})();

// ---------- 시점 회전 (로블록스식) ----------
const SENS = 0.0025;
function clampPitch(p){ return Math.max(0.12, Math.min(1.18, p)); }
function requestLook(){   // PC에서 마우스만 움직여도 시점이 돌도록 포인터락 요청 (버튼 클릭 등 사용자 동작 안에서 호출)
  if(IS_TOUCH || !lockCanvas || document.pointerLockElement === lockCanvas) return;
  try{ const p = lockCanvas.requestPointerLock && lockCanvas.requestPointerLock(); if(p && p.catch) p.catch(()=>{}); }catch(e){}
}
(function setupLook(){
  let locked = false;
  document.addEventListener('pointerlockchange', ()=>{ locked = (document.pointerLockElement === lockCanvas); });

  // 화면(캔버스)을 클릭하면 마우스로 시점 조작 시작 (Esc로 풀렸을 때 다시 누르면 재시작)
  document.getElementById('game').addEventListener('click', ()=>{ audioInit(); if(STATE==='play') requestLook(); });

  // 포인터락 중: 마우스 이동 = 시점 회전 / 락 해제 상태: 드래그(버튼 누른 채)로도 회전 가능
  let dragging = false, lx = 0, ly = 0;
  document.getElementById('game').addEventListener('mousedown', e=>{ if(!locked && STATE==='play'){ dragging = true; lx = e.clientX; ly = e.clientY; } });
  window.addEventListener('mouseup', ()=>{ dragging = false; });
  window.addEventListener('mousemove', e=>{
    if(STATE !== 'play') return;
    let dx, dy;
    if(locked){ dx = e.movementX || 0; dy = e.movementY || 0; }
    else if(dragging){ dx = e.clientX - lx; dy = e.clientY - ly; lx = e.clientX; ly = e.clientY; }
    else return;
    camYaw -= dx * SENS;
    camPitch = clampPitch(camPitch + dy * SENS);
  });

  // 터치: 이동 조이스틱/점프 버튼을 뺀 화면 영역을 밀면 시점 회전
  const pad = document.getElementById('lookPad');
  let lookId = null, tx = 0, ty = 0;
  pad.addEventListener('pointerdown', ev=>{ lookId = ev.pointerId; tx = ev.clientX; ty = ev.clientY; pad.setPointerCapture(ev.pointerId); audioInit(); });
  pad.addEventListener('pointermove', ev=>{
    if(ev.pointerId !== lookId) return;
    const dx = ev.clientX - tx, dy = ev.clientY - ty; tx = ev.clientX; ty = ev.clientY;
    camYaw -= dx * SENS * 1.5;
    camPitch = clampPitch(camPitch + dy * SENS * 1.5);
  });
  function endLook(ev){ if(ev.pointerId === lookId) lookId = null; }
  pad.addEventListener('pointerup', endLook);
  pad.addEventListener('pointercancel', endLook);
})();

// ---------- 물리 & 게이트 판정 ----------
function doorRegion(x){
  for(let i=0;i<3;i++){
    if(Math.abs(x - DOOR_XS[i]) <= DOOR_W/2 + 0.05) return i;
  }
  return -1;
}
function gateCollision(prevZ){
  for(const g of gates){
    if(Math.abs(pZ - g.wallZ) > 3 && Math.abs(prevZ - g.wallZ) > 3) continue;
    const zFront = g.wallZ + 0.3 + P_R;
    const zBack  = g.wallZ - 0.3 - P_R;
    const headRel = (pY + P_H) - g.platTop;
    const region = doorRegion(pX);
    const passable = g.solved && region === g.correct && headRel < DOOR_H + 0.1;

    // 앞(+Z)에서 벽 통과 시도
    if(prevZ >= zFront && pZ < zFront){
      if(passable) continue;
      pZ = zFront + 0.02; vZ = 0;
      if(region >= 0 && !g.solved && g.cool <= 0){
        answerDoor(g, region);
        g.cool = 0.9;
        if(!g.solved) pZ = zFront + 0.55;   // 오답이면 살짝 밀려남
      }
    }
    // 뒤(-Z)에서 되돌아 통과 시도
    else if(prevZ <= zBack && pZ > zBack){
      if(!passable){ pZ = zBack - 0.02; vZ = 0; }
    }
  }
}

function update(dt){
  const t = clock.elapsedTime;

  // 움직이는 발판
  for(const p of platforms){
    if(!p.moving) continue;
    if(p.axis === 'y'){
      const nt = p.baseTop + Math.sin(t*p.sp + p.ph) * p.amp;
      p.top = nt;
      p.mesh.position.y = nt - 0.55;
      p.dirt.position.y = nt - 1.52;
    } else {
      const nx = p.baseX + Math.sin(t*p.sp + p.ph) * p.amp;
      const dx = nx - p.x;
      p.x = nx;
      p.mesh.position.x = nx;
      p.dirt.position.x = nx;
      if(standOn === p) pX += dx;
    }
  }

  // 정답 문 열림 애니메이션
  for(const g of gates){
    if(g.solved && g.openT < 1){
      g.openT = Math.min(1, g.openT + dt*1.6);
      const e = 1 - Math.pow(1 - g.openT, 3);
      const d = g.doors[g.correct];
      d.mesh.position.y = d.openY0 + e*3.7;
      d.label.position.y = d.openY0 + 0.05 + e*3.7;
    }
  }

  // 벽이 카메라와 캐릭터 사이에 있으면 반투명하게 (통과 직후 가림 방지)
  for(const g of gates){
    const occl = (pZ < g.wallZ + 0.6) && (camera.position.z > g.wallZ);
    const target = occl ? 0.15 : 1;
    for(const m of g.fadeMats){
      m.opacity += (target - m.opacity) * Math.min(1, 8*dt);
    }
  }

  if(STATE === 'play'){
    for(const g of gates){ if(g.cool > 0) g.cool -= dt; }

    // 입력 → 이동 (로블록스식: 카메라가 보는 방향이 '앞'. WASD/조이스틱은 시점 기준)
    let f = 0, r = 0;
    if(keys['arrowup'] || keys['w']) f += 1;      // 앞으로
    if(keys['arrowdown'] || keys['s']) f -= 1;    // 뒤로
    if(keys['arrowright'] || keys['d']) r += 1;   // 오른쪽
    if(keys['arrowleft'] || keys['a']) r -= 1;    // 왼쪽
    f += -stickY;                                  // 조이스틱 위 = 앞으로
    r += stickX;                                   // 조이스틱 오른쪽 = 오른쪽으로
    // 카메라 방향(camYaw) 기준 전후·좌우를 월드 좌표로 변환
    const fwdX = -Math.sin(camYaw), fwdZ = -Math.cos(camYaw);
    const rgtX =  Math.cos(camYaw), rgtZ = -Math.sin(camYaw);
    let ix = f*fwdX + r*rgtX;
    let iz = f*fwdZ + r*rgtZ;
    const il = Math.hypot(ix, iz);
    if(il > 1){ ix/=il; iz/=il; }
    vX = ix * SPEED;
    vZ = iz * SPEED;

    // 점프 (코요테 + 버퍼)
    if(onGround) coyote = 0.12; else coyote -= dt;
    if(jumpBuf > 0) jumpBuf -= dt;
    if(jumpBuf > 0 && coyote > 0){
      vY = JUMP_V;
      onGround = false; standOn = null;
      coyote = 0; jumpBuf = 0;
      sfx.jump();
    }

    vY -= G_CUR * dt;
    const prevY = pY, prevZ = pZ;
    pX += vX * dt;
    pZ += vZ * dt;
    pY += vY * dt;

    // 발판 위 유지 확인
    if(standOn){
      const p = standOn;
      if(Math.abs(pX - p.x) > p.hw + P_R*0.7 || Math.abs(pZ - p.z) > p.hd + P_R*0.7){
        standOn = null; onGround = false;
      } else {
        pY = p.top; vY = Math.min(vY, 0);
      }
    }
    // 착지 판정
    if(!standOn && vY <= 0){
      for(const p of platforms){
        if(prevY >= p.top - 0.02 && pY <= p.top &&
           Math.abs(pX - p.x) <= p.hw + P_R*0.7 &&
           Math.abs(pZ - p.z) <= p.hd + P_R*0.7){
          pY = p.top; vY = 0; onGround = true; standOn = p;
          break;
        }
      }
    }
    if(!standOn) onGround = false;

    gateCollision(prevZ);

    // 동전
    for(const c of coins){
      if(c.taken) continue;
      c.mesh.rotation.z += 3*dt;
      const dy = (pY + 1) - c.y;
      if(Math.abs(pX - c.mesh.position.x) < 1.0 &&
         Math.abs(pZ - c.z) < 1.0 && Math.abs(dy) < 1.5){
        c.taken = true; c.mesh.visible = false;
        coinCount++; runCoins++; markDirty(); sfx.coin(); updateHUD();
      }
    }

    // 문제 배너: 가까운 미해결 게이트 (바뀔 때만 갱신)
    let near = null;
    for(const g of gates){
      if(g.solved) continue;
      if(pZ < g.gz + 7 && pZ > g.wallZ - 1){ near = g; break; }
    }
    if(near !== bannerGate){
      bannerGate = near;
      if(near) showBanner(near.q); else hideBanner();
    }

    // 낙하
    if(pY < -11) respawn();

    // 골인
    if(pZ < goalZ + 3 && STATE === 'play') finishGame();

    // 캐릭터 방향/걷기
    if(il > 0.05){
      const target = Math.atan2(vX, vZ) + Math.PI;
      let diff = target - player.rotation.y;
      while(diff > Math.PI) diff -= Math.PI*2;
      while(diff < -Math.PI) diff += Math.PI*2;
      player.rotation.y += diff * Math.min(1, 12*dt);
      walkPhase += dt * 11;
    } else {
      walkPhase *= 0.8;
    }
    const sw = Math.sin(walkPhase) * (onGround ? 0.55 : 0.2);
    parts.legL.rotation.x = sw;  parts.legR.rotation.x = -sw;
    parts.armL.rotation.x = -sw; parts.armR.rotation.x = sw;
  }

  player.position.set(pX, pY, pZ);

  // 펫 따라오기
  if(petGroup && petGroup.children.length){
    const k = Math.min(1, 6*dt);
    petGroup.position.x += (pX + 1.5 - petGroup.position.x) * k;
    petGroup.position.z += (pZ + 1.1 - petGroup.position.z) * k;
    const ty = pY + 0.85 + Math.sin(t*3 + petBob) * petAmp;
    petGroup.position.y += (ty - petGroup.position.y) * k;
    if(petSpin){
      petGroup.rotation.y += 2.2*dt;
    } else {
      let dr = player.rotation.y - petGroup.rotation.y;
      while(dr > Math.PI) dr -= Math.PI*2;
      while(dr < -Math.PI) dr += Math.PI*2;
      petGroup.rotation.y += dr * Math.min(1, 5*dt);
    }
  }

  // 보스 & 별 발사체
  if(bossGroup){
    bossBob += dt;
    if(!bossDead){
      bossGroup.position.y = bossBaseY + Math.sin(bossBob * 1.8) * 0.25;
      if(bossHitT > 0){
        bossHitT -= dt;
        bossGroup.rotation.z = Math.sin(bossHitT * 26) * 0.14 * bossHitT;
        const sq = 1 + bossHitT * 0.25;
        bossGroup.scale.set(sq, 2 - sq, sq);
      } else {
        bossGroup.rotation.z = 0;
        bossGroup.scale.set(1, 1, 1);
      }
    } else {
      bossGroup.rotation.z += 3.2 * dt;
      bossGroup.position.y -= 3.5 * dt;
      const sc = Math.max(0.02, bossGroup.scale.x - 0.7 * dt);
      bossGroup.scale.set(sc, sc, sc);
    }
  }
  for(let i = shots.length - 1; i >= 0; i--){
    const s = shots[i];
    s.t += dt * 2.0;
    if(!bossGroup){ scene.remove(s.m); shots.splice(i,1); continue; }
    const k = Math.min(1, s.t);
    const tx = bossGroup.position.x, ty = bossGroup.position.y + 2.4, tz = bossGroup.position.z;
    s.m.position.set(
      s.sx + (tx - s.sx)*k,
      s.sy + (ty - s.sy)*k + Math.sin(k*Math.PI)*1.6,
      s.sz + (tz - s.sz)*k
    );
    s.m.rotation.x += 8*dt; s.m.rotation.y += 6*dt;
    if(k >= 1){
      bossHitT = 0.55;
      tone(180, 0.18, 'square', 0.14, 90);
      burst(tx, ty, tz, 14, [0xFFE066, 0xFF8A5C, 0xffffff]);
      scene.remove(s.m); s.m.geometry.dispose(); s.m.material.dispose();
      shots.splice(i,1);
    }
  }

  // 별 간판 회전 연출
  if(starMesh) starMesh.rotation.z = Math.sin(t*1.5) * 0.06;

  // 카메라
  if(STATE === 'menu'){
    menuT += dt * 0.3;
    camera.position.set(Math.sin(menuT)*13, 6.5, Math.cos(menuT)*13);
    camera.lookAt(0, 2, 0);
  } else {
    // 카메라가 플레이어를 camYaw/camPitch 각도로 공전하며 따라다님 (로블록스식 3인칭)
    const cp = Math.cos(camPitch), sp = Math.sin(camPitch);
    const cx = pX + CAM_DIST * cp * Math.sin(camYaw);
    const cz = pZ + CAM_DIST * cp * Math.cos(camYaw);
    const cy = pY + CAM_DIST * sp + 0.6;
    const k = Math.min(1, 10*dt);
    camera.position.x += (cx - camera.position.x) * k;
    camera.position.y += (cy - camera.position.y) * k;
    camera.position.z += (cz - camera.position.z) * k;
    if(shake > 0){
      shake -= dt*1.6;
      camera.position.x += (Math.random()-0.5)*shake*0.7;
      camera.position.y += (Math.random()-0.5)*shake*0.7;
    }
    camera.lookAt(pX, pY + 1.7, pZ);
  }

  updateParticles(dt);
}

// ---------- 루프 ----------
function animate(){
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  if(dirty && performance.now() - lastSaveT > 2500) saveProfile();
  renderer.render(scene, camera);
}

// ---------- UI 바인딩 ----------
document.querySelectorAll('.gradePill').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.gradePill').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    loadProfile(Number(b.dataset.g));
    audioInit();
  });
});
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('replayBtn').addEventListener('click', startGame);
document.getElementById('menuBtn').addEventListener('click', ()=>{
  STATE = 'menu';
  if(document.exitPointerLock) document.exitPointerLock();
  el('endScreen').style.display = 'none';
  el('hud').style.display = 'none';
  el('touchUI').style.display = 'none';
  el('startScreen').style.display = 'flex';
});
document.getElementById('shopBtn').addEventListener('click', ()=>{ audioInit(); openShop('start'); });
document.getElementById('endShopBtn').addEventListener('click', ()=>{ audioInit(); openShop('end'); });
document.getElementById('shopClose').addEventListener('click', closeShop);
document.getElementById('pullBtn').addEventListener('click', doPull);
document.querySelectorAll('.stageCard').forEach(b=>{
  b.addEventListener('click', ()=>{
    const si = Number(b.dataset.s);
    audioInit();
    if(!stageUnlocked(si)){ toast('앞 스테이지를 먼저 클리어해봐! 🔒', 1200); return; }
    STAGE = si;
    updateStageRow();
    buildDeco(STAGE);
    buildCourse(GRADE, STAGE);
    tone(600, 0.08, 'sine', 0.1);
  });
});
document.getElementById('nextStageBtn').addEventListener('click', ()=>{
  if(STAGE < STAGES.length - 1 && stageUnlocked(STAGE + 1)) STAGE = STAGE + 1;
  updateStageRow();
  startGame();
});
(function setupReportGate(){
  const rb = document.getElementById('reportBtn');
  let pressT = null;
  rb.addEventListener('pointerdown', e=>{
    e.preventDefault();
    audioInit();
    rb.textContent = '꾹 누르는 중…';
    pressT = setTimeout(()=>{
      pressT = null;
      rb.textContent = '📊 부모님 리포트';
      openReport();
    }, 1600);
  });
  function cancel(){
    if(pressT){
      clearTimeout(pressT); pressT = null;
      toast('부모님용이에요! 1.5초 이상 꾹 눌러요 👆', 1300);
    }
    rb.textContent = '📊 부모님 리포트';
  }
  rb.addEventListener('pointerup', cancel);
  rb.addEventListener('pointerleave', cancel);
  rb.addEventListener('pointercancel', cancel);
})();
document.getElementById('reportClose').addEventListener('click', closeReport);
document.getElementById('controlsHint').innerHTML = IS_TOUCH
  ? '🕹️ 왼쪽 조이스틱 이동 · 오른쪽 버튼 점프 · 👆 화면을 밀어 시점 돌리기'
  : '⌨️ WASD/방향키 이동 · 스페이스 점프 · 🖱️ 마우스로 시점 돌리기';

// ---------- 시작 ----------
init3D();
buildPlayer();
buildDeco(0);
buildCourse(1, 0);       // 메뉴 배경용
pX = 0; pY = 0.05; pZ = 0;
loadProfile(1);
clock = new THREE.Clock();
renderer.setAnimationLoop(animate);
</script>
